name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # `dot` isn't needed for the current unit tests (they only cover
      # pure conversion logic) but it is needed for any future
      # integration tests that shell out. Installing is ~1s on Ubuntu.
      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build ./...
